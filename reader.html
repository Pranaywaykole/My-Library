<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reading — The Grand Library</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;700&family=Merriweather:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="CSS/reader.css">
</head>
<body>

  <!-- TOP BAR -->
  <div class="reader-bar">
    <div class="reader-bar-left">
      <a href="index.html" class="close-btn">← Back to Library</a>
      <div class="reader-book-info">
        <div class="reader-title" id="reader-title">Loading...</div>
        <div class="reader-author" id="reader-author"></div>
      </div>
    </div>
    <div class="reader-controls">
      <button class="ctrl-btn" id="font-down">A−</button>
      <span class="font-display" id="font-display">17</span>
      <button class="ctrl-btn" id="font-up">A+</button>
      <div class="theme-switcher">
        <button class="theme-btn active" data-theme="sepia">Sepia</button>
        <button class="theme-btn" data-theme="dark">Dark</button>
        <button class="theme-btn" data-theme="light">Light</button>
      </div>
    </div>
  </div>

  <!-- MAIN READER BODY -->
  <div class="reader-body">

    <!-- SIDEBAR -->
    <div class="reader-sidebar">
      <div class="sidebar-section">
        <div class="sidebar-label">Book Cover</div>
        <div class="cover-container">
          <img id="sidebar-cover" src="" alt="Book cover" onerror="this.style.display='none'">
          <div class="cover-placeholder" id="cover-placeholder">📚</div>
        </div>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-label">Details</div>
        <div class="meta-item">
          <div class="meta-key">Author</div>
          <div class="meta-val" id="sidebar-author">—</div>
        </div>
        <div class="meta-item">
          <div class="meta-key">Genre</div>
          <div class="meta-val" id="sidebar-genre">—</div>
        </div>
        <div class="meta-item">
          <div class="meta-key">Downloads</div>
          <div class="meta-val" id="sidebar-downloads">—</div>
        </div>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-label">Reading Progress</div>
        <div class="progress-track">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <div class="progress-text" id="progress-text">Loading...</div>
      </div>
    </div>

    <!-- READING PAGE -->
    <div class="reader-page" id="reader-page">

      <!-- Loading state -->
      <div class="reader-loading" id="reader-loading">
        <div class="loading-spinner"></div>
        <p>Fetching book from Project Gutenberg...</p>
        <p class="loading-sub">Loading the full text — this may take a moment</p>
      </div>

      <!-- Error state -->
      <div class="reader-error" id="reader-error" style="display:none">
        <p class="error-icon">📚</p>
        <p class="error-title">Could not load book</p>
        <p class="error-msg" id="error-msg"></p>
        <button onclick="retryLoad()" class="retry-btn">Try Again</button>
      </div>

      <!-- Actual book content -->
      <div class="book-content" id="book-content" style="display:none">
        <div class="book-text" id="book-text"></div>
      </div>

    </div>

  </div>

  <!-- BOTTOM PAGE NAVIGATION -->
  <div class="page-nav">
    <button class="nav-btn" id="prev-btn" disabled onclick="prevPage()">← Previous</button>
    <span class="page-indicator" id="page-indicator">—</span>
    <button class="nav-btn" id="next-btn" disabled onclick="nextPage()">Next →</button>
  </div>

  <script src="JS/reader.js"></script>
</body>
</html>
