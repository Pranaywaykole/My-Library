<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Grand Library — Room</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="CSS/room.css">
  </head>

  <body>

    <!-- TOP BAR — shows room name and character info -->
    <div class="room-topbar">
      <div class="room-topbar-left">
        <a href="index.html" class="back-btn">← Back to Library</a>
        <span class="current-room-name" id="current-zone">Grand Hall</span>
      </div>
      <div class="room-topbar-right">
        <span class="room-character-display" id="room-character-display">
          Choose a character first
        </span>
        <span class="room-controls-hint">Move with Arrow Keys or WASD</span>
      </div>
    </div>

    <!-- THE MAIN ROOM WRAPPER -->
    <div class="room-wrapper">

      <!-- THE ACTUAL ROOM FLOOR — everything inside is positioned absolutely -->
      <div class="room-floor" id="room-floor">

        <!-- ── WALLS AND STRUCTURE ── -->
        <div class="wall wall-top"></div>
        <div class="wall wall-bottom"></div>
        <div class="wall wall-left"></div>
        <div class="wall wall-right"></div>

        <!-- ── FLOOR ZONES — colored areas showing different sections ── -->
        <div class="zone zone-grand-hall"    id="zone-grand-hall"></div>
        <div class="zone zone-coffee-shop"   id="zone-coffee-shop"></div>
        <div class="zone zone-reading-lounge" id="zone-reading-lounge"></div>
        <div class="zone zone-study"         id="zone-study"></div>

        <!-- Zone Labels -->
        <div class="zone-label" style="left: 200px; top: 80px;">Grand Hall</div>
        <div class="zone-label" style="left: 680px; top: 80px;">Coffee Shop</div>
        <div class="zone-label" style="left: 120px; top: 380px;">Reading Lounge</div>
        <div class="zone-label" style="left: 700px; top: 380px;">The Quiet Study</div>

        <!-- ── BOOKSHELVES ── -->
        <div class="furniture bookshelf bookshelf-1" data-label="Bookshelf"></div>
        <div class="furniture bookshelf bookshelf-2" data-label="Bookshelf"></div>
        <div class="furniture bookshelf bookshelf-3" data-label="Bookshelf"></div>
        <div class="furniture bookshelf bookshelf-4" data-label="Bookshelf"></div>
        <div class="furniture bookshelf bookshelf-5" data-label="Bookshelf"></div>

        <!-- ── TABLES ── -->
        <div class="furniture table reading-table-1" data-label="Reading Table"></div>
        <div class="furniture table reading-table-2" data-label="Reading Table"></div>
        <div class="furniture table coffee-table"    data-label="Coffee Table"></div>
        <div class="furniture table coffee-room-table-2" data-label="Coffee Table — Press E to sit"></div>


        <!-- ── CHAIRS AND SOFAS ── -->
        <div class="furniture sofa sofa-1"   data-label="Sofa"></div>
        <div class="furniture sofa sofa-2"   data-label="Sofa"></div>
        <div class="furniture chair chair-1" data-label="Chair"></div>
        <div class="furniture chair chair-2" data-label="Chair"></div>
        <div class="furniture chair chair-3" data-label="Chair"></div>
        <div class="furniture chair chair-4" data-label="Chair"></div>
        <div class="furniture chair coffee-chair-1" data-label="Chair"></div>

        <!-- ── COFFEE CORNER ── -->
        <div class="furniture coffee-counter" data-label="Coffee Counter"></div>
        <div class="furniture coffee-machine" data-label="Coffee Machine"></div>


        <!-- ── DECORATIONS ── -->
        <div class="furniture plant plant-1"></div>
        <div class="furniture plant plant-2"></div>
        <div class="furniture plant plant-3"></div>
        <div class="furniture rug rug-1"></div>
        <div class="furniture rug rug-2"></div>
        <div class="furniture lamp lamp-1"></div>
        <div class="furniture lamp lamp-2"></div>

        <!-- ── THE PLAYER CHARACTER ── -->
        <!--
          This is the character the user controls.
          It starts at position left:400px top:300px.
          JavaScript will move it by changing these values.
        -->
        <div class="character-sprite" id="player">
          <div class="character-bubble" id="character-bubble">🧙</div>
          <div class="character-name"   id="character-name">Scholar</div>
          <div class="character-shadow"></div>
        </div>

        <!-- ── INTERACTION PROMPT ── -->
        <!--
          This small popup appears when the character
          is near a piece of furniture.
        -->
        <div class="interaction-prompt" id="interaction-prompt">
          Press E to interact
        </div>

      </div>
      <!-- end room-floor -->

    </div>
    <!-- end room-wrapper -->

    <!-- MINI MAP — shows where in the room the character is -->
    <div class="minimap" id="minimap">
      <div class="minimap-title">Room Map</div>
      <div class="minimap-floor" id="minimap-floor">
        <div class="minimap-player" id="minimap-player"></div>
      </div>
    </div>

    <!-- ROOM MESSAGE LOG — shows events and interactions -->
    <div class="message-log" id="message-log">
      <div class="message-log-title">Room Events</div>
      <div class="message-log-body" id="message-log-body">
        <p class="log-entry">Welcome to The Grand Library room!</p>
      </div>
    </div>

    <script src="JS/room.js"></script>
  </body>

</html>
